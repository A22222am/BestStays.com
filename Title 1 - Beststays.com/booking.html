<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Inquiry - Beststays.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Beststays.com</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="listings.html">Our Homestays</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <div class="card p-4" id="bookingCard">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Make a Booking Inquiry</h2>
                        <p class="text-center text-muted mb-4">Fill out the form below and our team will get back to you.</p>

                        <form id="inquiryForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="fullName" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="emailAddress" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="emailAddress" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="contactNumber" class="form-label">Contact Number</label>
                                <input type="tel" class="form-control" id="contactNumber" placeholder="+60123456789" required>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="checkIn" class="form-label">Check-in Date</label>
                                    <input type="date" class="form-control" id="checkIn" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="checkOut" class="form-label">Check-out Date</label>
                                    <input type="date" class="form-control" id="checkOut" required>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label for="guests" class="form-label">Number of Guests</label>
                                    <input type="number" class="form-control" id="guests" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="unitType" class="form-label">Unit Type</label>
                                    <select class="form-select" id="unitType" required>
                                        <option value="" selected disabled>Select a homestay...</option>
                                        <option value="Studio Room">Studio Room</option>
                                        <option value="Family Suite">Family Suite</option>
                                        <option value="Luxury Unit">Luxury Unit</option>
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2">Submit Inquiry</button>
                        </form>
                    </div>
                </div>

                <!-- Dummy Thank You Message -->
                <div class="card d-none p-5 text-center" id="thankYouMessage">
                    <h2 class="text-success mb-3">Thank You!</h2>
                    <p class="lead">Your booking inquiry has been successfully received.</p>
                    <a href="listings.html" class="btn btn-outline-primary mt-3">Return to Listings</a>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Beststays.com. BERC2393 Assignment.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('inquiryForm').addEventListener('submit', function(event) {
            event.preventDefault();
            document.getElementById('bookingCard').classList.add('d-none');
            document.getElementById('thankYouMessage').classList.remove('d-none');
        });
    </script>
</body>
</html>
