<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beststays.com - Stay Comfortably, Travel Happily</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- INTERNAL CSS -->
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121316 !important;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        h1, h2, .subtitle-top {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
        }

        /* NAVBAR GELAP PEKAT */
        .custom-navbar {
            background-color: rgba(18, 19, 22, 0.95) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            padding-bottom: 15px;
        }

        .custom-navbar .navbar-brand {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: #ffffff !important;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .custom-navbar .nav-link {
            color: rgba(255, 255, 255, 0.65) !important;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 400;
            padding-left: 15px !important;
            padding-right: 15px !important;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #ffffff !important;
            font-weight: 500;
        }

        /* BANNER UTAMA (GAMBAR 1: mainpage.png) */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('mainpage.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding-top: 100px;
        }

        .subtitle-top {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .subtitle-sub {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.5;
            margin-bottom: 40px;
        }

        .main-heading {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 10px;
            margin-bottom: 50px;
        }

        .view-exp-link {
            color: #ffffff !important;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding-bottom: 5px;
            transition: 0.3s ease;
        }

        .view-exp-link:hover {
            border-bottom-color: #ffffff;
            letter-spacing: 4px;
        }

        /* SLAID KEDUA (GAMBAR 2: secondpage.png) */
        .video-section {
            height: 100vh;
            display: flex;
            align-items: center;
            /* Tukar nama fail gambar kedua di sini */
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), url('secondpage.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .video-content-holder {
            width: 100%;
            padding-left: 10%;
            padding-right: 10%;
        }

        .pause-indicator {
            font-size: 1.2rem;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .aesthetic-quote {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 40px;
        }

        /* BUTANG PETAK PREMIUM */
        .btn-premium {
            display: inline-block;
            padding: 14px 35px;
            background-color: #ffffff !important;
            color: #121316 !important;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none !important;
            border: 1px solid #ffffff;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background-color: transparent !important;
            color: #ffffff !important;
        }

        .btn-premium.btn-outline {
            background-color: transparent !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-left: 15px;
        }

        .btn-premium.btn-outline:hover {
            border-color: #ffffff;
            background-color: #ffffff !important;
            color: #121316 !important;
        }

        .player-bar-container {
            margin-top: 60px;
            max-width: 500px;
            display: flex;
            align-items: center;
        }

        .fake-progress-line {
            height: 2px;
            background-color: rgba(255, 255, 255, 0.15);
            position: relative;
            flex-grow: 1;
            margin-right: 20px;
        }

        .fake-progress-fill {
            width: 40%;
            height: 100%;
            background-color: #ffffff;
            position: relative;
        }

        .fake-progress-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translate(50%, -50%);
        }

        .volume-icon {
            font-size: 0.85rem;
            opacity: 0.4;
        }

        .custom-footer {
            background-color: #121316;
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.4;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="index.html">BESTSTAYS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="listings.html">Homestays</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">About & Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <!-- SLAID 1: BANNER UTAMA (Guna mainpage.png) -->
        <section class="hero-section">
            <div class="container d-flex flex-column justify-content-between h-100 py-5">
                <div>
                    <p class="subtitle-top">PREMIUM ACCOMMODATION</p>
                    <p class="subtitle-sub">Malacca, Malaysia</p>
                </div>
                
                <div>
                    <h1 class="main-heading">BESTSTAYS<br>HOMESTAY</h1>
                </div>
                
                <div>
                    <a href="#video-section" class="view-exp-link">View Experience →</a>
                </div>
            </div>
        </section>

        <!-- SLAID 2: URBAN ESCAPE (Guna secondpage.png) -->
        <section id="video-section" class="video-section">
            <div class="video-content-holder">
                <div class="pause-indicator">‖</div>
                <h2 class="aesthetic-quote">
                    Urban escape.<br>
                    Breathtaking views.<br>
                    Welcome to Beststays.
                </h2>
                
                <div>
                    <a href="listings.html" class="btn-premium">View Homestays</a>
                    <a href="booking.html" class="btn-premium btn-outline">Check Availability</a>
                </div>

                <div class="player-bar-container">
                    <div class="fake-progress-line">
                        <div class="fake-progress-fill">
                            <div class="fake-progress-dot"></div>
                        </div>
                    </div>
                    <div class="volume-icon">🔊</div>
                </div>
            </div>
        </section>
    </main>

    <footer class="custom-footer text-center py-4">
        <p class="mb-0">&copy; 2026 Beststays.com. BERC2393 Assignment.</p>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
