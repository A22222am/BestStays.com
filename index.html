<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beststays.com - Stay Comfortably, Travel Happily</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121316 !important;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
        }

        /* NAVBAR */
        .custom-navbar {
            background-color: #121316 !important;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
            z-index: 9999 !important;
        }

        .custom-navbar .navbar-brand {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: #fff !important;
            letter-spacing: 2px;
        }

        .custom-navbar .nav-link {
            color: rgba(255,255,255,0.7) !important;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .custom-navbar .nav-link:hover {
            color: #fff !important;
        }

        /* HERO */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(18,19,22,0.4),rgba(18,19,22,0.6)),
            url('mainpage.png');
            background-size: cover;
            background-position: center;
            padding-top: 80px;
        }

        .main-heading {
            font-size: clamp(2.3rem, 7vw, 5rem);
            letter-spacing: 8px;
        }

        .view-exp-link {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.5);
            font-size: 0.75rem;
        }

        /* VIDEO SECTION */
        .video-section {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(18,19,22,0.6);
        }

        .video-content-holder {
            position: relative;
            z-index: 2;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
        }

        .aesthetic-quote {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 4rem);
        }

        .btn-premium {
            padding: 12px 30px;
            background: #fff;
            color: #121316;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
            border: 1px solid #fff;
            transition: 0.3s;
        }

        .btn-premium:hover {
            background: transparent;
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            color: #fff;
        }

        .btn-outline:hover {
            background: #fff;
            color: #121316;
        }

        footer {
            background: #121316;
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

<!-- NAVBAR (FIXED - TAK COLLAPSE) -->
<nav class="navbar navbar-dark fixed-top custom-navbar">
    <div class="container d-flex justify-content-between align-items-center">

        <a class="navbar-brand" href="index.html">BESTSTAYS</a>

        <ul class="navbar-nav d-flex flex-row gap-4">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="listings.html">Homestays</a></li>
            <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
            <li class="nav-item"><a class="nav-link" href="aboutus.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="Contactus.html">Contact</a></li>
        </ul>

    </div>
</nav>

<main>

<!-- HERO -->
<section class="hero-section">
    <div>
        <p>PREMIUM ACCOMMODATION</p>
        <h1 class="main-heading">BESTSTAYS<br>HOMESTAY</h1>
        <a href="#video-section" class="view-exp-link">View Experience →</a>
    </div>
</section>

<!-- VIDEO -->
<section id="video-section" class="video-section">

    <video autoplay muted loop playsinline class="video-bg">
        <source src="vdpage2.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="video-content-holder">
        <h2 class="aesthetic-quote">
            Urban escape.<br>
            Breathtaking views.<br>
            Welcome to BestStays.
        </h2>

        <div>
            <a href="listings.html" class="btn-premium">View Homestays</a>
            <a href="booking.html" class="btn-premium btn-outline">Check Availability</a>
        </div>
    </div>

</section>

</main>

<footer>
    © 2026 Beststays.com. BERC2393 Assignment.
</footer>

</body>
</html>
