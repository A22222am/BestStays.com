<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beststays.com - Stay Comfortably, Travel Happily</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* 1. ASAS HALAMAN GELAP (DIJAMIN TAKKAN KELUAR PUTIH) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #121316 !important; /* Hitam arang premium */
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            scroll-behavior: smooth;
        }

        h1, h2, .subtitle-top {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
        }

        /* 2. MENU NAVBAR (IKUT SENARAI FAIL PROJEK KAU) */
        .custom-navbar {
            background-color: rgba(18, 19, 22, 0.95) !important; /* Latar belakang menu gelap pekat */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            padding-bottom: 15px;
        }

        .custom-navbar .navbar-brand {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            color: #ffffff !important;
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .custom-navbar .nav-link {
            color: rgba(255, 255, 255, 0.65) !important;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 400;
            padding-left: 15px !important;
            padding-right: 15px !important;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .custom-navbar .nav-link:hover, 
        .custom-navbar .nav-link.active {
            color: #ffffff !important;
            font-weight: 500;
        }

        /* BANNER UTAMA (SLAID 1) */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-column: justify-content-between;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), #1a1c23; /* Backup warna jika gambar gagal load */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1566073771259-6a8506099945?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            padding-top: 100px;
        }

        .subtitle-top {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .subtitle-sub {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.5;
            margin-bottom: 40px;
        }

        .main-heading {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 10px;
            margin-bottom: 50px;
        }

        .view-exp-link {
            color: #ffffff !important;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            padding-bottom: 5px;
            transition: 0.3s ease;
        }

        .view-exp-link:hover {
            border-bottom-color: #ffffff;
            letter-spacing: 4px;
        }

        /* BANNER VIDEO / URBAN ESCAPE (SLAID 2) */
        .video-section {
            height: 100vh;
            position: relative;
            background-color: #16181d; /* Warna backup gelap gelap */
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .video-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-bg-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.35);
        }

        .video-content-holder {
            position: relative;
            z-index: 2;
            width: 100%;
            padding-left: 10%;
            padding-right: 10%;
        }

        .pause-indicator {
            font-size: 1.2rem;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .aesthetic-quote {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 400;
            line-height: 1.3;
            margin-bottom: 40px;
        }

        /* BUTANG CTA PETAK DIJAMIN CANTIK (BUANG TEKS BIRU HUDUH) */
        .btn-premium {
            display: inline-block;
            padding: 14px 35px;
            background-color: #ffffff !important;
            color: #121316 !important;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none !important;
            border: 1px solid #ffffff;
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background-color: transparent !important;
            color: #ffffff !important;
        }

        .btn-premium.btn-outline {
            background-color: transparent !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-left: 15px;
        }

        .btn-premium.btn-outline:hover {
            border-color: #ffffff;
            background-color: #ffffff !important;
            color: #121316 !important;
        }

        /* SIMULASI CONTROL PLAYER (GARISAN BAWAH) */
        .player-bar-container {
            margin-top: 60px;
            max-width: 500px;
            display: flex;
            align-items: center;
        }

        .fake-progress-line {
            height: 2px;
            background-color: rgba(255, 255, 255, 0.15);
            position: relative;
            flex-grow: 1;
            margin-right: 20px;
        }

        .fake-progress-fill {
            width: 40%;
            height: 100%;
            background-color: #ffffff;
            position: relative;
        }

        .fake-progress-dot {
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
